spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop   # cámbialo a create-drop para que borre y cree todo
    show-sql: true
    defer-datasource-initialization: true
  sql:
    init:
      mode: always